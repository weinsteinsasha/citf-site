</script> <!-- Отключаем в Tilda подмену картинок на webp/resize. 
     Делает четыре вещи БЕЗ ломания загрузки:
     1) Блокируем установку класса t-webp и сбрасываем webp-детект (CSS не переключится на webp).
     2) Очищаем background-image при установке стилей (вырезаем "/-/" и ".webp") — это то место, где Zero-Block чаще всего подменяет картинки.
     3) Очищаем src/srcset у IMG/SOURCE (убираем webp-варианты и "/-/").
     4) Делаем мягкий проход по DOM на старте + наблюдатель с дебаунсом и короткими ретраями, чтобы «последним словом» оставался оригинал.
     Вставляйте в HEAD сайта (или в «Доп. код страницы»). --> <script>
(function(){
  'use strict';

  /* ========= УТИЛИТЫ ========= */
  const WEBP_RE        = /\.webp($|\?)/i;
  const FORMAT_WEBP_RE = /\/-\/.*format\/webp/i;
  const TRANSFORM_RE   = /\/-\/.*?(?=(\?|#|$))/;   // всё после первого "/-/" до ?/#/конца
  const BG_URL_RE      = /url\((['"]?)([^'")]+)\1\)/i;

  const isWebpUrl = (u) => WEBP_RE.test(u) || FORMAT_WEBP_RE.test(u);
  const stripTransforms = (u) => (typeof u === 'string' ? u.replace(TRANSFORM_RE, '') : u);

  function cleanUrl(u){
    if (!u) return u;
    let out = stripTransforms(u);
    // если всё ещё .webp (редкость) — убираем расширение webp
    if (WEBP_RE.test(out)) out = out.replace(WEBP_RE, '');
    return out;
  }

  function cleanSrcset(srcset){
    if (!srcset) return '';
    const parts = srcset.split(',').map(s=>s.trim()).filter(Boolean);
    const kept  = [];
    for (const part of parts){
      const url  = part.split(/\s+/)[0];
      const rest = part.slice(url.length);
      if (!isWebpUrl(url)) kept.push(cleanUrl(url) + rest);
    }
    return kept.join(', ');
  }

  function cleanStyleValue(val){
    if (!val) return val;
    // image-set(...) — выкидываем webp-кандидаты, убираем "/-/"
    if (/image-set\(/i.test(val)) {
      val = val.replace(/image-set\((.*?)\)/ig, (m, inner) => {
        const items = inner.split(',').map(s => s.trim());
        const kept  = items.filter(x => !/format\(["']?webp["']?\)/i.test(x) && !/\.webp/i.test(x))
                           .map(x => x.replace(TRANSFORM_RE, ''));
        return kept.length ? `image-set(${kept.join(', ')})` : '';
      });
      return val;
    }
    // обычный url(...)
    return val.replace(BG_URL_RE, (m,q,url)=>`url(${q}${cleanUrl(url)}${q})`);
  }

  function extractBgUrl(styleStr){
    const m = BG_URL_RE.exec(styleStr || '');
    return m ? m[2] : null;
  }

  /* ========= БЛОКИРУЕМ t-webp РАНО ========= */
  try {
    // некоторые скрипты Tilda смотрят в sessionStorage — сразу говорим «нет webp»
    sessionStorage.setItem('tilda_webp', 'no');
  } catch(e){}

  try {
    const root = document.documentElement;
    // запрещаем добавлять t-webp именно на <html>
    const _add = DOMTokenList.prototype.add;
    DOMTokenList.prototype.add = function(...tokens){
      if (this === root.classList) tokens = tokens.filter(t => t !== 't-webp');
      return _add.apply(this, tokens);
    };
    root.classList.remove('t-webp');
    root.classList.add('t-nowebp');
  } catch(e){}

  /* ========= АККУРАТНЫЕ ПАТЧИ ========= */
  // 1) style.setProperty('background-image', ...) — вычищаем "/-/" и webp
  (function(){
    const raw = CSSStyleDeclaration.prototype.setProperty;
    CSSStyleDeclaration.prototype.setProperty = function(prop, value, priority){
      try {
        if (String(prop).toLowerCase() === 'background-image' && typeof value === 'string') {
          value = cleanStyleValue(value);
        }
      } catch(e){}
      return raw.call(this, prop, value, priority);
    };
  })();

  // 2) setAttribute для src/srcset/style — чиним только нужные случаи
  (function(){
    const raw = Element.prototype.setAttribute;
    Element.prototype.setAttribute = function(name, value){
      try {
        const n = String(name).toLowerCase();
        const tag = this.tagName;
        if (n === 'src' && tag === 'IMG') {
          value = cleanUrl(value);
        } else if (n === 'srcset' && (tag === 'IMG' || tag === 'SOURCE')) {
          value = cleanSrcset(String(value||''));
        } else if (n === 'style') {
          value = cleanStyleValue(String(value||''));
        } else if (n === 'data-original-webp' || n === 'data-bg-webp' || n === 'data-tn-webp') {
          value = ''; // обезвреживаем webp-подсказки
        }
      } catch(e){}
      return raw.call(this, name, value);
    };
  })();

  /* ========= ПРОХОДЫ ПО DOM ========= */
  function fixImg(img){
    if (!img) return;
    if (img.hasAttribute('data-original-webp')) img.removeAttribute('data-original-webp');

    // приоритет: data-original (оригинал, который хранит Тильда)
    let candidate = img.getAttribute('data-original');
    if (!candidate) candidate = cleanUrl(img.getAttribute('src') || '');

    // чистим srcset
    if (img.hasAttribute('srcset')) {
      const cleaned = cleanSrcset(img.getAttribute('srcset') || '');
      if (cleaned) img.setAttribute('srcset', cleaned);
      else { img.removeAttribute('srcset'); img.removeAttribute('sizes'); }
    }

    if (candidate && (isWebpUrl(img.src) || img.src !== candidate)) {
      // Ставим через setAttribute — пойдёт через наш патч и ещё раз очистится
      img.setAttribute('src', candidate);
    }
  }

  function fixPicture(pic){
    if (!pic) return;
    // выкидываем webp-источники
    pic.querySelectorAll('source[type="image/webp"], source[srcset*=".webp"], source[srcset*="/-/format/webp"]').forEach(s => s.remove());
    // чистим оставшиеся srcset
    pic.querySelectorAll('source[srcset]').forEach(s=>{
      const cleaned = cleanSrcset(s.getAttribute('srcset') || '');
      if (cleaned) s.setAttribute('srcset', cleaned); else s.remove();
    });
    const img = pic.querySelector('img'); if (img) fixImg(img);
  }

  function fixBackground(el){
    if (!el) return;
    if (el.hasAttribute('data-original-webp')) el.removeAttribute('data-original-webp');

    // источник: data-original / data-bg / inline background-image
    let src = el.getAttribute('data-original') || el.getAttribute('data-bg');
    if (!src) {
      const inline = el.style && el.style.backgroundImage ? extractBgUrl(el.style.backgroundImage) : null;
      if (inline) src = inline;
    }
    if (!src) return;

    const cleaned = cleanUrl(src);
    // Ставим с !important, чтобы перебить одинаковый приоритет
    el.style.setProperty('background-image', `url("${cleaned}")`, 'important');
  }

  function sweep(root){
    const scope = root || document;
    scope.querySelectorAll('picture').forEach(fixPicture);
    scope.querySelectorAll('img').forEach(fixImg);
    scope.querySelectorAll('.tn-atom__img, [style*="background-image"], [data-bg], [data-original], [data-original-webp]').forEach(fixBackground);
  }

  // короткая серия ретраев — чтобы «побеждать» последнюю подмену Tilda без заметного мерцания
  function retrySweep(target){
    const root = (target && target.ownerDocument) ? target : document;
    const delays = [0, 30, 60, 120, 250, 500, 1000]; // ~1с суммарно
    for (const d of delays) setTimeout(()=>sweep(root), d);
  }

  /* ========= СТАРТ + НАБЛЮДАТЕЛЬ ========= */
  function start(){
    // начальный проход
    sweep(document);

    // «бурст» — первые 10 секунд (подхватывает ленивые подмены)
    let t = 0;
    const BURST_MS = 250, BURST_MAX = 10000;
    const endAt = Date.now() + BURST_MAX;
    const timer = setInterval(()=>{
      sweep(document);
      if (Date.now() > endAt) clearInterval(timer);
    }, BURST_MS);

    // наблюдаем за изменениями, триггерим короткий ряд ретраев
    const mo = new MutationObserver(muts=>{
      for (const m of muts){
        if (m.type === 'childList'){
          if (m.addedNodes && m.addedNodes.length){
            for (const n of m.addedNodes){
              if (n && n.nodeType === 1){
                if (
                  n.matches?.('img, picture, .tn-atom__img, [style*="background-image"], [data-bg], [data-original]') ||
                  n.querySelector?.('img, picture, .tn-atom__img, [style*="background-image"], [data-bg], [data-original]')
                ){
                  retrySweep(n);
                  break;
                }
              }
            }
          }
        } else if (m.type === 'attributes'){
          const a = (m.attributeName||'').toLowerCase();
          if (a === 'src' || a === 'srcset' || a === 'style' || a === 'data-bg' || a === 'data-original' || a === 'data-original-webp'){
            retrySweep(m.target);
          }
        }
      }
    });

    mo.observe(document.documentElement, {
      subtree: true,
      childList: true,
      attributes: true,
      attributeFilter: ['src','srcset','style','data-bg','data-original','data-original-webp']
    });

    // на случай ленивой подгрузки «по скроллу»
    ['scroll','resize','orientationchange','visibilitychange'].forEach(ev=>{
      window.addEventListener(ev, ()=>retrySweep(document), {passive:true});
    });

    window.addEventListener('load', ()=>retrySweep(document), {once:true});
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', start, { once:true });
  } else {
    start();
  }
})();
